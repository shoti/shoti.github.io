<article class="post">
  <header class="post-header">
    <h1>{{postTitle}}</h1>
    <div class="post-meta">
      <time datetime="{{date}}">{{dateFormatted}}</time>
      <span class="reading-time" data-words="{{wordCount}}"></span>
      {{#if tags}}<span class="post-tags">{{tags}}</span>{{/if}}
    </div>
  </header>
  <div class="post-body">
    {{body}}
  </div>
  <nav class="post-nav">
    {{#if prevPost}}<a href="/posts/{{prevSlug}}/" class="post-nav-prev">← {{prevTitle}}</a>{{/if}}
    {{#if nextPost}}<a href="/posts/{{nextSlug}}/" class="post-nav-next">{{nextTitle}} →</a>{{/if}}
  </nav>
</article>
